<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 920" role="img" aria-labelledby="title desc">
  <title id="title">Terraform Proxmox Architecture</title>
  <desc id="desc">Per-VM Terraform layers, S3 remote state, GitHub Actions change detection, and Proxmox VM deployment flow.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="proxmox" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e57000"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="aws" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#e57000"/>
    </marker>
    <style type="text/css"><![CDATA[
      .title { font: 700 28px system-ui, -apple-system, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .section { font: 700 13px system-ui, -apple-system, sans-serif; fill: #334155; letter-spacing: 0.04em; }
      .label { font: 600 12px system-ui, -apple-system, sans-serif; fill: #1e293b; }
      .text { font: 500 11px system-ui, -apple-system, sans-serif; fill: #475569; }
      .mono { font: 500 10px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .badge { font: 700 10px system-ui, -apple-system, sans-serif; fill: #ffffff; }
    ]]></style>
  </defs>

  <rect width="1280" height="920" fill="url(#bg)"/>
  <rect x="40" y="28" width="1200" height="64" rx="16" fill="url(#accent)" opacity="0.12"/>
  <text x="64" y="58" class="title">Terraform Proxmox - Architecture</text>
  <text x="64" y="80" class="subtitle">One Terraform state per VM | Shared S3 bucket | Git-diff driven deployments</text>

  <!-- Developer -->
  <g filter="url(#shadow)">
    <rect x="64" y="120" width="220" height="96" rx="14" fill="url(#card)" stroke="#e2e8f0"/>
    <circle cx="96" cy="152" r="18" fill="#dbeafe"/>
    <circle cx="96" cy="148" r="7" fill="#3b82f6"/>
    <rect x="90" y="158" width="12" height="10" rx="3" fill="#3b82f6"/>
    <text x="124" y="150" class="label">Developer</text>
    <text x="124" y="168" class="text">terraform plan / apply</text>
    <text x="124" y="184" class="text">per VM layer</text>
    <text x="80" y="204" class="mono">live/hydra/pad/</text>
  </g>

  <!-- GitHub -->
  <g filter="url(#shadow)">
    <rect x="320" y="120" width="260" height="96" rx="14" fill="url(#card)" stroke="#e2e8f0"/>
    <rect x="336" y="136" width="52" height="24" rx="12" fill="#24292f"/>
    <text x="362" y="152" text-anchor="middle" class="badge">Git</text>
    <text x="400" y="150" class="label">GitHub Actions</text>
    <text x="336" y="172" class="text">detect-layers.sh / deploy.sh</text>
    <text x="336" y="188" class="text">PR: plan | main: apply</text>
    <text x="336" y="204" class="mono">.github/workflows/deploy.yml</text>
  </g>

  <!-- Detection box -->
  <g filter="url(#shadow)">
    <rect x="620" y="120" width="280" height="96" rx="14" fill="url(#card)" stroke="#c7d2fe"/>
    <circle cx="656" cy="142" r="10" fill="#6366f1"/>
    <path d="M652 142 L655 145 L661 138" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="672" y="148" class="label">Change Detection</text>
    <text x="644" y="168" class="text">modules/* changed = all VMs</text>
    <text x="644" y="184" class="text">live/hydra/pad/* = hydra/pad only</text>
    <text x="644" y="200" class="text">node secrets = all VMs on node</text>
  </g>

  <!-- Repo -->
  <g filter="url(#shadow)">
    <rect x="64" y="252" width="836" height="300" rx="18" fill="url(#card)" stroke="#e2e8f0"/>
    <rect x="88" y="268" width="4" height="16" rx="2" fill="#3b82f6"/>
    <text x="100" y="282" class="section">REPOSITORY</text>

    <!-- Module -->
    <rect x="88" y="300" width="200" height="220" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <rect x="108" y="314" width="14" height="14" rx="3" fill="#3b82f6"/>
    <text x="128" y="328" class="label">modules/proxmox_vm</text>
    <text x="108" y="350" class="text">VM clone from template</text>
    <text x="108" y="366" class="text">Cloud-init / snippets</text>
    <text x="108" y="382" class="text">Disk resize, tags, SSH</text>
    <rect x="108" y="398" width="160" height="22" rx="6" fill="#dbeafe"/>
    <text x="118" y="413" class="mono">main.tf, cloud_init.tf</text>
    <rect x="108" y="430" width="160" height="22" rx="6" fill="#dbeafe"/>
    <text x="118" y="445" class="mono">variables.tf, output.tf</text>
    <text x="108" y="478" class="text">Shared by every VM layer</text>
    <text x="108" y="496" class="text">Change triggers full rollout</text>

    <!-- Live hydra -->
    <rect x="312" y="300" width="280" height="220" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
    <rect x="332" y="314" width="14" height="14" rx="3" fill="#10b981"/>
    <text x="352" y="328" class="label">live/hydra/ - node hydra</text>
    <text x="332" y="350" class="mono">env.secrets.auto.tfvars</text>
    <g>
      <rect x="332" y="362" width="72" height="28" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="368" y="381" text-anchor="middle" class="mono">pad</text>
      <rect x="412" y="362" width="72" height="28" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="448" y="381" text-anchor="middle" class="mono">wiki</text>
      <rect x="492" y="362" width="88" height="28" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="536" y="381" text-anchor="middle" class="mono">nextcloud</text>

      <rect x="332" y="398" width="96" height="28" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="380" y="417" text-anchor="middle" class="mono">controller</text>
      <rect x="436" y="398" width="72" height="28" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="472" y="417" text-anchor="middle" class="mono">grafana</text>
      <rect x="516" y="398" width="64" height="28" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
      <text x="548" y="417" text-anchor="middle" class="mono">datasyn</text>

      <text x="332" y="448" class="text">Each folder = Terraform root</text>
      <text x="332" y="464" class="mono">main.tf, providers.tf, backend.hcl</text>
      <text x="332" y="480" class="mono">variables.tf, env.auto.tfvars</text>
      <text x="332" y="504" class="text">VM IDs: 110-114, 118</text>
    </g>

    <!-- Live dunwitch -->
    <rect x="612" y="300" width="260" height="220" rx="12" fill="#faf5ff" stroke="#ddd6fe"/>
    <rect x="632" y="314" width="14" height="14" rx="3" fill="#8b5cf6"/>
    <text x="652" y="328" class="label">live/dunwitch/ - node dunwitch</text>
    <text x="632" y="350" class="mono">env.secrets.auto.tfvars</text>
    <rect x="632" y="370" width="88" height="32" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="676" y="391" text-anchor="middle" class="mono">testing</text>
    <text x="632" y="424" class="text">Isolated test environment</text>
    <text x="632" y="440" class="mono">VM ID: 201</text>
    <text x="632" y="468" class="text">Same module, own state key</text>
    <text x="632" y="496" class="text">backend.hcl - unique S3 key</text>
  </g>

  <!-- Scripts pill -->
  <g filter="url(#shadow)">
    <rect x="928" y="252" width="288" height="120" rx="14" fill="#1e293b"/>
    <text x="952" y="284" class="section" fill="#e2e8f0">DEPLOY SCRIPTS</text>
    <text x="952" y="308" class="mono" fill="#cbd5e1">deploy.sh</text>
    <text x="952" y="326" class="text" fill="#94a3b8">init, plan, apply, detect-layers</text>
    <text x="952" y="348" class="mono" fill="#cbd5e1">detect-layers.sh</text>
    <text x="952" y="366" class="text" fill="#94a3b8">git diff to JSON matrix output</text>
  </g>

  <!-- S3 -->
  <g filter="url(#shadow)">
    <rect x="64" y="592" width="520" height="280" rx="18" fill="url(#card)" stroke="#fed7aa"/>
    <rect x="64" y="592" width="520" height="44" rx="18" fill="url(#aws)"/>
    <rect x="64" y="620" width="520" height="16" fill="url(#aws)"/>
    <text x="88" y="622" class="section" fill="#ffffff">AWS S3 - Remote State</text>
    <text x="88" y="660" class="label">Bucket: rlab-tfstate</text>
    <text x="88" y="680" class="text">One shared bucket | encrypt=true | region us-east-1</text>

    <rect x="88" y="700" width="468" height="148" rx="12" fill="#fff7ed" stroke="#fdba74"/>
    <text x="108" y="726" class="mono">proxmox/hydra/pad/terraform.tfstate</text>
    <text x="108" y="746" class="mono">proxmox/hydra/wiki/terraform.tfstate</text>
    <text x="108" y="766" class="mono">proxmox/hydra/nextcloud/terraform.tfstate</text>
    <text x="108" y="786" class="mono">proxmox/hydra/controller/terraform.tfstate</text>
    <text x="108" y="806" class="mono">proxmox/hydra/grafana/terraform.tfstate</text>
    <text x="108" y="826" class="mono">proxmox/hydra/datasyn-agent/terraform.tfstate</text>
    <text x="320" y="826" class="mono">proxmox/dunwitch/testing/terraform.tfstate</text>
  </g>

  <!-- Proxmox -->
  <g filter="url(#shadow)">
    <rect x="620" y="592" width="596" height="280" rx="18" fill="url(#card)" stroke="#fde68a"/>
    <rect x="620" y="592" width="596" height="44" rx="18" fill="url(#proxmox)"/>
    <rect x="620" y="620" width="596" height="16" fill="url(#proxmox)"/>
    <text x="644" y="622" class="section" fill="#ffffff">PROXMOX CLUSTER</text>

    <!-- Node hydra -->
    <rect x="644" y="656" width="260" height="192" rx="12" fill="#fffbeb" stroke="#fcd34d"/>
    <text x="664" y="684" class="label">Node: hydra</text>
    <text x="664" y="702" class="text">bpg/proxmox provider | tf@pve API token</text>
    <g>
      <rect x="664" y="716" width="54" height="24" rx="6" fill="#ffffff" stroke="#e2e8f0"/><text x="691" y="732" text-anchor="middle" class="mono" font-size="9">Pad 110</text>
      <rect x="724" y="716" width="54" height="24" rx="6" fill="#ffffff" stroke="#e2e8f0"/><text x="751" y="732" text-anchor="middle" class="mono" font-size="9">Wiki 111</text>
      <rect x="784" y="716" width="68" height="24" rx="6" fill="#ffffff" stroke="#e2e8f0"/><text x="818" y="732" text-anchor="middle" class="mono" font-size="9">Nextcloud</text>
      <rect x="664" y="748" width="74" height="24" rx="6" fill="#ffffff" stroke="#e2e8f0"/><text x="701" y="764" text-anchor="middle" class="mono" font-size="9">Controller</text>
      <rect x="744" y="748" width="62" height="24" rx="6" fill="#ffffff" stroke="#e2e8f0"/><text x="775" y="764" text-anchor="middle" class="mono" font-size="9">Grafana</text>
      <rect x="812" y="748" width="72" height="24" rx="6" fill="#fef3c7" stroke="#fbbf24"/><text x="848" y="764" text-anchor="middle" class="mono" font-size="9">Datasyn 118</text>
    </g>
    <text x="664" y="796" class="text">Templates: debian 6010 | ubuntu 6009/6013</text>
    <text x="664" y="814" class="text">Cloud-init via API + optional SSH snippets</text>
    <text x="664" y="832" class="text">Datastore: tank | local-lvm | local</text>

    <!-- Node dunwitch -->
    <rect x="924" y="656" width="268" height="192" rx="12" fill="#fffbeb" stroke="#fcd34d"/>
    <text x="944" y="684" class="label">Node: dunwitch</text>
    <text x="944" y="702" class="text">Same provider pattern</text>
    <rect x="944" y="720" width="88" height="32" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="988" y="741" text-anchor="middle" class="mono">Testing 201</text>
    <text x="944" y="776" class="text">16 GB disk | debian template</text>
    <text x="944" y="794" class="text">Non-production sandbox</text>
    <text x="944" y="832" class="text">Independent state and lifecycle</text>
  </g>

  <!-- Flow arrows -->
  <path d="M284 168 L320 168" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M580 168 L620 168" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M760 216 L760 252" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M188 216 L188 252" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M452 520 L452 592" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M760 520 L760 560 L918 560 L918 700" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M584 872 L700 872" stroke="#e57000" stroke-width="2.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="640" y="862" text-anchor="middle" class="text">terraform apply creates proxmox_virtual_environment_vm</text>

  <!-- Legend -->
  <g filter="url(#shadow)">
    <rect x="928" y="396" width="288" height="168" rx="14" fill="url(#card)" stroke="#e2e8f0"/>
    <text x="952" y="424" class="section">KEY IDEAS</text>
    <circle cx="964" cy="446" r="5" fill="#3b82f6"/><text x="978" y="450" class="text">Isolated blast radius per VM</text>
    <circle cx="964" cy="468" r="5" fill="#10b981"/><text x="978" y="472" class="text">Shared module, unique state key</text>
    <circle cx="964" cy="490" r="5" fill="#f59e0b"/><text x="978" y="494" class="text">Node-level secrets reused by VMs</text>
    <circle cx="964" cy="512" r="5" fill="#8b5cf6"/><text x="978" y="516" class="text">CI deploys only changed layers</text>
    <circle cx="964" cy="534" r="5" fill="#ef4444"/><text x="978" y="538" class="text">Module change rolls out all VMs</text>
  </g>
</svg>
