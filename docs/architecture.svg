<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Terraform Proxmox Infrastructure</title>
  <desc id="desc">Developer and CI deploy per-VM Terraform layers to Proxmox via a shared module and S3 remote state.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <style type="text/css"><![CDATA[
      .title { font: 700 24px system-ui, -apple-system, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 13px system-ui, -apple-system, sans-serif; fill: #64748b; }
      .section { font: 700 12px system-ui, -apple-system, sans-serif; fill: #334155; letter-spacing: 0.04em; }
      .label { font: 600 12px system-ui, -apple-system, sans-serif; fill: #1e293b; }
      .text { font: 500 11px system-ui, -apple-system, sans-serif; fill: #475569; }
      .mono { font: 500 10px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
    ]]></style>
  </defs>

  <rect width="960" height="640" fill="url(#bg)"/>
  <text x="48" y="44" class="title">Infrastructure overview</text>
  <text x="48" y="66" class="subtitle">One Terraform state per VM | shared module | S3 backend | git-diff CI</text>

  <!-- Operators -->
  <g filter="url(#shadow)">
    <rect x="48" y="96" width="180" height="72" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="68" y="124" class="label">Developer</text>
    <text x="68" y="144" class="text">plan / apply locally</text>
    <text x="68" y="158" class="mono">deploy.sh</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="252" y="96" width="180" height="72" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="272" y="124" class="label">GitHub Actions</text>
    <text x="272" y="144" class="text">PR: plan | main: apply</text>
    <text x="272" y="158" class="text">changed layers only</text>
  </g>

  <!-- Repository -->
  <g filter="url(#shadow)">
    <rect x="48" y="200" width="864" height="200" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="72" y="228" class="section">REPOSITORY</text>

    <rect x="72" y="248" width="200" height="132" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="92" y="272" class="label">modules/proxmox_vm</text>
    <text x="92" y="294" class="text">Clone template VM</text>
    <text x="92" y="310" class="text">Cloud-init, disk, network</text>
    <text x="92" y="334" class="text">Shared by all layers</text>
    <text x="92" y="358" class="text">Change -&gt; all VMs in CI</text>

    <rect x="296" y="248" width="280" height="132" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="316" y="272" class="label">live/&lt;node&gt;/</text>
    <text x="316" y="294" class="mono">env.secrets.auto.tfvars</text>
    <rect x="316" y="306" width="240" height="56" rx="8" fill="#ffffff" stroke="#86efac" stroke-dasharray="4 3"/>
    <text x="436" y="330" text-anchor="middle" class="text">VM layers (one folder each)</text>
    <text x="436" y="348" text-anchor="middle" class="mono">main.tf, backend.hcl, env.auto.tfvars</text>

    <rect x="600" y="248" width="280" height="132" rx="10" fill="#faf5ff" stroke="#ddd6fe"/>
    <text x="620" y="272" class="label">Per-VM layer</text>
    <text x="620" y="294" class="mono">live/hydra/&lt;vm&gt;/</text>
    <text x="620" y="318" class="text">Own Terraform root</text>
    <text x="620" y="334" class="text">Own state key in S3</text>
    <text x="620" y="358" class="text">Independent lifecycle</text>
  </g>

  <!-- S3 -->
  <g filter="url(#shadow)">
    <rect x="48" y="432" width="400" height="168" rx="16" fill="#ffffff" stroke="#fdba74"/>
    <rect x="48" y="432" width="400" height="36" rx="16" fill="#f97316"/>
    <rect x="48" y="456" width="400" height="12" fill="#f97316"/>
    <text x="72" y="456" class="section" fill="#ffffff">AWS S3 - remote state</text>
    <text x="72" y="492" class="label">Bucket: rlab-tfstate</text>
    <text x="72" y="512" class="text">region us-east-1, encrypt=true</text>
    <rect x="72" y="528" width="352" height="52" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text x="88" y="552" class="mono">proxmox/&lt;node&gt;/&lt;vm&gt;/terraform.tfstate</text>
    <text x="88" y="570" class="text">One state file per VM layer</text>
  </g>

  <!-- Proxmox -->
  <g filter="url(#shadow)">
    <rect x="480" y="432" width="432" height="168" rx="16" fill="#ffffff" stroke="#fcd34d"/>
    <rect x="480" y="432" width="432" height="36" rx="16" fill="#e57000"/>
    <rect x="480" y="456" width="432" height="12" fill="#e57000"/>
    <text x="504" y="456" class="section" fill="#ffffff">PROXMOX</text>

    <rect x="504" y="484" width="180" height="96" rx="10" fill="#fffbeb" stroke="#fcd34d"/>
    <text x="524" y="508" class="label">Node: hydra</text>
    <rect x="524" y="520" width="140" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-dasharray="4 3"/>
    <text x="594" y="548" text-anchor="middle" class="text">VMs (cloned from templates)</text>

    <rect x="704" y="484" width="180" height="96" rx="10" fill="#fffbeb" stroke="#fcd34d"/>
    <text x="724" y="508" class="label">Node: dunwitch</text>
    <rect x="724" y="520" width="140" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-dasharray="4 3"/>
    <text x="794" y="548" text-anchor="middle" class="text">VMs (test / sandbox)</text>
  </g>

  <!-- Arrows -->
  <path d="M228 132 L252 132" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M136 168 L136 200" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M342 168 L342 200" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M248 400 L248 432" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M696 400 L696 432" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M448 516 L480 516" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="480" y="624" text-anchor="middle" class="text">Terraform provider (bpg/proxmox) clones templates and applies cloud-init</text>
</svg>
